    <script>
      const LABELS = {
        zh: {
          title: "AReaL: 全异步强化学习训练系统",
          subtitle:
            "由清华大学交叉信息研究院与蚂蚁集团联合推出 | NeurIPS 2025, arXiv:2505.24298",
          "stat1-label": "相对同步RL提速",
          "stat2-label": "GPU线性扩展",
          "stat3-label": "GitHub Stars",

          "h-intro": "简介与概览",
          "p-intro-1":
            "AReaL 是一个专为大语言模型（LLM）推理和智能体训练打造的<b>全异步强化学习训练系统</b>。随着深度思考模型（如 o1）和复杂智能体的兴起，传统的同步 RLHF（基于人类反馈的强化学习）或 PPO 系统在训练效率上面临巨大瓶颈。",
          "p-intro-2":
            "通过在算法与系统层面的深度协同设计，AReaL 彻底打破了生成和训练节点之间的同步壁垒，让集群中的所有 GPU 保持时刻满载运转。",

          "h-problem": "问题剖析：同步强化学习的低效",
          "p-problem-1":
            "传统的大规模 RL 系统采用同步架构。在这种架构下，模型需要先生成一批回复（Rollout），再集中计算奖励，最后进行梯度更新。这引入了致命的<b>“掉队者问题”（Straggler Problem）</b>。",
          "p-problem-2":
            "由于大模型生成的回复长度参差不齐，整个系统必须停下来等待最慢的那个请求完成。在此期间，负责训练的 GPU 处于闲置状态；而在训练更新参数时，负责生成的 GPU 同样无事可做。这种算力浪费在长序列推理任务中尤为严重。",

          "h-arch": "核心架构：四大组件",
          "p-arch-1":
            "AReaL 创新性地将系统拆分为四个完全解耦的异步组件，数据在它们之间以流（Stream）的形式传递，不再有全局同步屏障。",

          "arch-diag-title": "AReaL 系统数据流向",
          "arch-n1-t": "采样控制器<br>(Rollout Controller)",
          "arch-n1-d":
            "连接各组件的枢纽，管理全局数据流，并负责触发和广播最新的模型权重更新。",
          "arch-n2-t": "可中断采样节点<br>(Interruptible Rollout)",
          "arch-n2-d":
            "负责生成响应。支持生成中断：丢弃旧的 KV Cache，加载新权重后重新 Prefill 并继续解码。",
          "arch-n3-t": "训练节点<br>(Trainer Workers)",
          "arch-n3-d":
            "从经验回放缓冲区持续获取数据，执行不间断的 PPO 梯度更新，不等待数据收集。",
          "arch-n4-t": "奖励计算服务<br>(Reward Service)",
          "arch-n4-d":
            "异步执行环境交互或代码测试以计算奖励值，避免阻塞生成和训练进程。",

          "arch-step-1": "步骤 1: 采样控制器向 Worker 分发 Prompt",
          "arch-step-2": "步骤 2: 采样节点持续生成 Token",
          "arch-step-3": "步骤 3: 生成中途收到权重更新！(丢弃KV，重新Prefill)",
          "arch-step-4": "步骤 4: 完成的响应被发送至奖励计算服务",
          "arch-step-5": "步骤 5: 奖励计算服务异步评测",
          "arch-step-6": "步骤 6: 携奖励的数据流向经验池 → 训练节点",
          "arch-step-7": "步骤 7: 训练节点持续更新权重，并广播回控制器",

          "h-adv": "全异步的核心优势",
          "l-adv":
            "<li><b>极致的性能飞跃</b>：在相同性能下，相比传统同步系统实现高达 <b>2.77倍</b> 的训练提速。</li><li><b>100% 硬件利用率</b>：消除同步等待，生成 GPU 与训练 GPU 同时且持续处于忙碌状态。</li><li><b>卓越的可扩展性</b>：在扩展至 512 张 GPU 时依然保持极佳的线性加速比。</li><li><b>无需批次同步</b>：彻底告别基于固定 Batch Size 的同步屏障限制。</li>",

          "h-chal1": "挑战一：数据陈旧度 (Data Staleness)",
          "p-chal1":
            "在异步训练中，生成数据的模型版本可能已经落后于当前正在训练的模型版本。这就是所谓的“陈旧度”。AReaL 引入了<b>感知陈旧度训练（Staleness-Aware Training）</b>。系统设定一个最大允许陈旧度阈值 <span class='math'>η</span>。当重放缓冲区中的数据版本与当前模型版本的差距超过 <span class='math'>η</span> 时，该数据将被自动丢弃，以保证训练的稳定性。",

          "h-chal2": "挑战二：不一致的策略版本",
          "p-chal2-1":
            "由于 AReaL 支持可中断的生成（Interruptible Generation），一条完整的轨迹（Trajectory）可能由多个不同的模型版本接力生成。传统的 PPO 算法假设整条轨迹来自单一的行为策略（Behavior Policy），这在异步系统中不再成立。为此，AReaL 提出了<b>解耦的 PPO 目标函数（Decoupled PPO Objective）</b>：",
          "p-chal2-2":
            "在这个新目标函数中，<span class='math'>π<sub>prox</sub></span> 是用于裁剪的参考策略（即最近一次同步的权重），而不是实际生成每个 token 的异构行为策略 <span class='math'>π<sub>behav</sub></span>。这一算法级的创新完美弥合了异步系统带来的理论鸿沟。",

          "h-intro": "Introduction & Overview",
          "p-intro-1":
            "AReaL is a <b>fully asynchronous reinforcement learning training system</b> tailored for LLM reasoning and agent training. With the rise of deep-thinking models (like o1) and complex agents, traditional synchronous RLHF/PPO systems face severe bottlenecks in training efficiency.",
          "p-intro-2":
            "Through deep co-design of both algorithms and systems, AReaL completely shatters the synchronization barriers between generation and training nodes, ensuring that all GPUs in the cluster remain fully utilized at all times.",

      let currentLang = "zh";

      function updateI18n() {
        const texts = LABELS[currentLang];
        for (const key in texts) {
          const el = document.getElementById(key);
          if (el) {
            el.innerHTML = texts[key];
          }
        }
        document.getElementById("lang-btn").textContent =
          currentLang === "zh" ? "English" : "中文";
        document.documentElement.lang = currentLang;
      }

      // Animations Setup
      function setupAnimations() {
        const svgPaths = document.getElementById("arch-paths");
        const controller = document.getElementById("node-controller");
        const rollout = document.getElementById("node-rollout");
        const reward = document.getElementById("node-reward");
        const trainer = document.getElementById("node-trainer");

        if (svgPaths && controller && rollout && reward && trainer) {
          const updatePaths = () => {
            const cRect = controller.getBoundingClientRect();
            const rRect = rollout.getBoundingClientRect();
            const rwRect = reward.getBoundingClientRect();
            const tRect = trainer.getBoundingClientRect();
            const stageRect = document
              .getElementById("arch-stage")
              .getBoundingClientRect();

            const getCenter = (rect) => ({
              x: rect.left - stageRect.left + rect.width / 2,
              y: rect.top - stageRect.top + rect.height / 2,
            });

            const c = getCenter(cRect);
            const r = getCenter(rRect);
            const rw = getCenter(rwRect);
            const t = getCenter(tRect);

            svgPaths.innerHTML = `
            <line x1="${c.x}" y1="${c.y}" x2="${r.x}" y2="${r.y}" />
            <line x1="${r.x}" y1="${r.y}" x2="${rw.x}" y2="${rw.y}" />
            <line x1="${rw.x}" y1="${rw.y}" x2="${t.x}" y2="${t.y}" />
            <line x1="${t.x}" y1="${t.y}" x2="${c.x}" y2="${c.y}" />
          `;
          };
          updatePaths();
          window.addEventListener("resize", updatePaths);
        }
      }

      let archStep = 1;
      function playArchAnimation() {
        const textEl = document.getElementById("arch-step-text");
        if (!textEl) return;

        textEl.style.opacity = "0";
        setTimeout(() => {
          textEl.innerHTML = LABELS[currentLang][`arch-step-${archStep}`] || "";
          textEl.style.opacity = "1";
        }, 300);

        // Visual effects
        const rolloutProgress = document.getElementById("rollout-progress");
        const stage = document.getElementById("arch-stage");
        const rollout = document.getElementById("node-rollout");

        if (archStep === 1) {
          createPacket(
            stage,
            "node-controller",
            "node-rollout",
            "packet-purple",
          );
          if (rolloutProgress) rolloutProgress.style.width = "0%";
        } else if (archStep === 2) {
          if (rolloutProgress) rolloutProgress.style.width = "50%";
        } else if (archStep === 3) {
          createPacket(
            stage,
            "node-controller",
            "node-rollout",
            "packet-purple",
          );
          if (rollout) {
            rollout.style.borderColor = "#ef4444";
            setTimeout(() => (rollout.style.borderColor = "#93c5fd"), 800);
          }
          if (rolloutProgress) {
            rolloutProgress.style.width = "10%";
            setTimeout(() => (rolloutProgress.style.width = "100%"), 500);
          }
        } else if (archStep === 4) {
          createPacket(stage, "node-rollout", "node-reward", "packet-blue");
        } else if (archStep === 5) {
          const reward = document.getElementById("node-reward");
          if (reward) {
            reward.style.transform = "scale(1.05)";
            setTimeout(() => (reward.style.transform = "scale(1)"), 500);
          }
        } else if (archStep === 6) {
          createPacket(stage, "node-reward", "node-trainer", "packet-green");
        } else if (archStep === 7) {
          createPacket(
            stage,
            "node-trainer",
            "node-controller",
            "packet-yellow",
          );
        }

        archStep = archStep >= 7 ? 1 : archStep + 1;
        setTimeout(playArchAnimation, 3500);
      }

      function createPacket(stage, fromId, toId, className) {
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);
        if (!from || !to || !stage) return;

        const sRect = stage.getBoundingClientRect();
        const fRect = from.getBoundingClientRect();
        const tRect = to.getBoundingClientRect();

        const packet = document.createElement("div");
        packet.className = `data-packet ${className}`;
        stage.appendChild(packet);

        const startX = fRect.left - sRect.left + fRect.width / 2;
        const startY = fRect.top - sRect.top + fRect.height / 2;
        const endX = tRect.left - sRect.left + tRect.width / 2;
        const endY = tRect.top - sRect.top + tRect.height / 2;

        packet.style.left = startX + "px";
        packet.style.top = startY + "px";
        packet.style.opacity = "1";

        const duration = 1500;
        const startTime = performance.now();

        function animate(time) {
          let t = (time - startTime) / duration;
          if (t > 1) t = 1;

          // simple ease in out
          const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

          packet.style.left = startX + (endX - startX) * ease + "px";
          packet.style.top = startY + (endY - startY) * ease + "px";

          if (t < 1) {
            requestAnimationFrame(animate);
          } else {
            packet.style.opacity = "0";
            setTimeout(() => packet.remove(), 300);
          }
        }
        requestAnimationFrame(animate);
      }

      let ppoStep = 1;
      function playPpoAnimation() {
        const textEl = document.getElementById("ppo-step-text");
        if (!textEl) return;

        textEl.style.opacity = "0";
        setTimeout(() => {
          textEl.innerHTML = LABELS[currentLang][`ppo-step-${ppoStep}`] || "";
          textEl.style.opacity = "1";
        }, 300);

        const s1 = document.getElementById("seg-v1");
        const s2 = document.getElementById("seg-v2");
        const s3 = document.getElementById("seg-v3");
        const l1 = document.getElementById("ppo-l1");
        const l2 = document.getElementById("ppo-l2");
        const l3 = document.getElementById("ppo-l3");
        const light1 = document.getElementById("light-1");
        const light2 = document.getElementById("light-2");
        const formula = document.getElementById("ppo-formula-display");

        if (ppoStep === 1) {
          s1.style.width = "30%";
          s1.textContent = "π_v1";
          s2.style.width = "0%";
          s2.textContent = "";
          s3.style.width = "0%";
          s3.textContent = "";
          l1.style.opacity = "1";
          l2.style.opacity = "0";
          l3.style.opacity = "0";
          light1.style.opacity = "0";
          light2.style.opacity = "0";
          formula.style.opacity = "0";
        } else if (ppoStep === 2) {
          light1.style.opacity = "1";
          light1.style.left = "30%";
          s2.style.width = "40%";
          s2.textContent = "π_v2";
          l2.style.opacity = "1";
        } else if (ppoStep === 3) {
          light2.style.opacity = "1";
          light2.style.left = "70%";
          s3.style.width = "30%";
          s3.textContent = "π_v3";
          l3.style.opacity = "1";
        } else if (ppoStep === 4) {
          formula.innerHTML = `ratio = π_θ / <span class="highlight-red">π_behav</span>`;
          formula.style.opacity = "1";
        } else if (ppoStep === 5) {
          formula.innerHTML = `ratio = π_θ / <span class="highlight-green">π_prox</span>`;
          s1.style.background = "#10b981";
          s2.style.background = "#10b981";
          s3.style.background = "#10b981";
          s1.textContent = "";
          s2.textContent = "π_prox";
          s3.textContent = "";
        }

        if (ppoStep === 5) {
          ppoStep = 1;
          setTimeout(() => {
            // reset colors
            s1.style.background = "";
            s2.style.background = "";
            s3.style.background = "";
            playPpoAnimation();
          }, 4000);
        } else {
          ppoStep++;
          setTimeout(playPpoAnimation, 3500);
        }
      }

      // Initialize
      document.getElementById("lang-btn").addEventListener("click", () => {
        currentLang = currentLang === "zh" ? "en" : "zh";
        updateI18n();
        // Update active animation steps text immediately
        const archText = document.getElementById("arch-step-text");
        if (archText)
          archText.innerHTML =
            LABELS[currentLang][
              `arch-step-${archStep === 1 ? 7 : archStep - 1}`
            ];
        const ppoText = document.getElementById("ppo-step-text");
        if (ppoText)
          ppoText.innerHTML =
            LABELS[currentLang][`ppo-step-${ppoStep === 1 ? 5 : ppoStep - 1}`];
      });
      updateI18n();

      setTimeout(() => {
        setupAnimations();
        playArchAnimation();
        playPpoAnimation();
      }, 500);
    </script>
